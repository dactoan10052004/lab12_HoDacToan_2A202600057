name: CI/CD — Build, Test, Deploy

on:
  push:
    branches: [main, lab12_version_1]
    paths:
      - "2A202600057-production-agent/**"
  pull_request:
    branches: [main]
    paths:
      - "2A202600057-production-agent/**"

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Test — chạy trên mọi push và PR
  # ─────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: 2A202600057-production-agent

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: 2A202600057-production-agent/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run production readiness checker
        run: python check_production_ready.py

      - name: Smoke test — import app modules
        run: |
          python -c "from app.config import settings; print('config OK')"
          python -c "from app.auth import verify_api_key; print('auth OK')"
          python -c "from app.rate_limiter import check_rate_limit; print('rate_limiter OK')"
          python -c "from app.cost_guard import check_budget; print('cost_guard OK')"

  # ─────────────────────────────────────────────
  # JOB 2: Deploy — chỉ chạy khi push lên main
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    needs: test                    # chỉ deploy nếu test pass
    if: github.ref_name == 'main' || github.ref_name == 'lab12_version_1'
    defaults:
      run:
        working-directory: 2A202600057-production-agent

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway up \
            --service d2874f62-f741-4482-a0a0-d98bf225564a \
            --detach

      - name: Verify deployment
        run: |
          echo "Waiting for deployment to start..."
          sleep 30
          STATUS=$(curl -sf https://toanhd-production.up.railway.app/health | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['status'])" 2>/dev/null || echo "unreachable")
          echo "Health status: $STATUS"
          if [ "$STATUS" != "ok" ]; then
            echo "Deployment verification failed!"
            exit 1
          fi
          echo "Deployment successful!"
