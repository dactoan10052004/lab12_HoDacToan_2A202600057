name: CI/CD — Build, Test, Deploy

on:
  push:
    branches: [main, lab12_version_1]
    paths:
      - "2A202600057-production-agent/**"
  pull_request:
    branches: [main]
    paths:
      - "2A202600057-production-agent/**"

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Test — Chạy trên mọi push và PR vào folder chỉ định
  # ─────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: 2A202600057-production-agent

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          # Sửa lại path cache cho chính xác với cấu trúc folder của bạn
          cache-dependency-path: 2A202600057-production-agent/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run production readiness checker
        run: python check_production_ready.py

      - name: Smoke test — import app modules
        run: |
          python -c "from app.config import settings; print('config OK')"
          python -c "from app.auth import verify_api_key; print('auth OK')"
          python -c "from app.rate_limiter import check_rate_limit; print('rate_limiter OK')"
          python -c "from app.cost_guard import check_budget; print('cost_guard OK')"

  # ─────────────────────────────────────────────
  # JOB 2: Deploy — Chỉ chạy khi Test pass và là nhánh được phép
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    needs: test
    # Điều kiện chạy deploy
    if: github.event_name == 'push' && (github.ref_name == 'main' || github.ref_name == 'lab12_version_1')
    defaults:
      run:
        working-directory: 2A202600057-production-agent

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        shell: bash
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        # Chú ý: Sử dụng lệnh up trực tiếp với Service Name/ID
        # --detach giúp job GitHub kết thúc sớm sau khi trigger thành công
        run: railway up --service toanhd --detach

      - name: Verify deployment
        run: |
          echo "Waiting for deployment to propagate (45s)..."
          sleep 45
          # Thêm -L để curl follow redirects nếu có
          STATUS=$(curl -sfL https://toanhd-production.up.railway.app/health | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('status', 'unknown'))" 2>/dev/null || echo "unreachable")
          echo "Health status: $STATUS"
          if [ "$STATUS" != "ok" ]; then
            echo "Deployment verification failed! Status is $STATUS"
            exit 1
          fi
          echo "Deployment successful!"